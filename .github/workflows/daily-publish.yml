name: Daily LeetCode Publish

on:
  schedule:
    # Runs once a day at 09:00 UTC. Change the cron time to whatever suits you.
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you manually trigger it from the Actions tab too

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish next solution
        run: |
          chmod +x scripts/publish_next.sh
          scripts/publish_next.sh

      - name: Commit and push if there are changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            FILE=$(git diff --cached --name-only | grep '^solutions/' | head -n 1)
            git commit -m "Add solution: $(basename "$FILE")"
            git push
          fi
